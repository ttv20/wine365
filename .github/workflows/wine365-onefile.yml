name: Build Wine 365 one-file installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bundle version (blank uses the commit)"
        required: false
        type: string
      update_manifest_url:
        description: "HTTPS update manifest embedded in the install (blank disables updates)"
        required: false
        type: string
      installer_url:
        description: "HTTPS .run URL written to the generated manifest (blank for now)"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "wine365-v*"

permissions:
  contents: write

concurrency:
  group: wine365-onefile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 360
    env:
      CONFIGURED_UPDATE_URL: ${{ inputs.update_manifest_url || vars.WINE365_UPDATE_MANIFEST_URL }}
      CONFIGURED_INSTALLER_URL: ${{ inputs.installer_url || vars.WINE365_INSTALLER_URL }}
    steps:
      - name: Check out Wine 365
        uses: actions/checkout@v4

      - name: Install Wine build dependencies when permitted
        shell: bash
        run: |
          set -euo pipefail
          if [[ $(id -u) -eq 0 ]]; then
            elevate=()
          elif command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            elevate=(sudo)
          else
            echo "Runner has no root/package-manager access; using preinstalled build dependencies."
            exit 0
          fi
          command -v apt-get >/dev/null || {
            echo "This automatic dependency step supports apt-based runner containers only." >&2
            exit 1
          }
          "${elevate[@]}" dpkg --add-architecture i386
          "${elevate[@]}" apt-get update
          "${elevate[@]}" apt-get install -y --no-install-recommends \
            autoconf bison build-essential ca-certificates flex zstd \
            gcc-mingw-w64-i686 gcc-mingw-w64-x86-64 \
            g++-mingw-w64-i686 g++-mingw-w64-x86-64 \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev \
            libcups2-dev libdbus-1-dev libfontconfig-dev \
            libfreetype-dev libgl1-mesa-dev libgnutls28-dev libgphoto2-dev \
            libgstreamer-plugins-base1.0-dev libgstreamer1.0-dev libkrb5-dev \
            libpcap-dev libpcsclite-dev libpulse-dev libsane-dev libsdl2-dev \
            libswresample-dev libswscale-dev libudev-dev libunwind-dev \
            libusb-1.0-0-dev libv4l-dev libvulkan-dev libwayland-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxi-dev \
            libxinerama-dev libxkbcommon-dev libxrandr-dev libxrender-dev \
            libxxf86vm-dev ocl-icd-opencl-dev samba-dev unixodbc-dev

      - name: Verify self-hosted build environment
        shell: bash
        run: |
          set -euo pipefail
          required=(make gcc g++ bison flex i686-w64-mingw32-gcc x86_64-w64-mingw32-gcc python3 tar zstd)
          missing=()
          for command in "${required[@]}"; do
            command -v "$command" >/dev/null || missing+=("$command")
          done
          if ((${#missing[@]})); then
            printf 'Missing runner dependency: %s\n' "${missing[@]}" >&2
            exit 1
          fi
          echo "Runner: $(uname -a)"
          echo "Available build cores: $(nproc)"
          df -h .

      - name: Select bundle version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          requested=${REQUESTED_VERSION:-}
          if [[ -n "$requested" ]]; then
            version=$requested
          elif [[ $GITHUB_REF == refs/tags/wine365-v* ]]; then
            version=${GITHUB_REF_NAME#wine365-v}
          else
            version="0.0.0-${GITHUB_SHA:0:12}"
          fi
          [[ $version =~ ^[A-Za-z0-9][A-Za-z0-9._+-]{0,127}$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure and build Wine 365
        run: |
          set -euo pipefail
          mkdir -p build stage
          cd build
          ../configure \
            --prefix=/opt/wine365 \
            --enable-archs=i386,x86_64 \
            --disable-tests
          echo "Building with $(nproc) parallel jobs"
          make -j"$(nproc)"
          make DESTDIR="$GITHUB_WORKSPACE/stage" install

      - name: Build self-extracting installer and manifest
        run: |
          set -euo pipefail
          mkdir -p release
          tools/wine365-manager/packaging/build-onefile.sh \
            stage/opt/wine365 \
            release/wine365-${{ steps.version.outputs.version }}-x86_64.run \
            '${{ steps.version.outputs.version }}' \
            "${CONFIGURED_UPDATE_URL:-}" \
            "${CONFIGURED_INSTALLER_URL:-}"

      - name: Build WineCharm WoW64 runner backup
        run: |
          set -euo pipefail
          runner="stage/opt/wine365"
          runner_name="wine365-${{ steps.version.outputs.version }}-wow64-x86_64"
          archive="release/${runner_name}.tar.zst"

          [[ -x "$runner/bin/wine" ]]
          [[ -d "$runner/lib/wine/i386-windows" ]]
          [[ -d "$runner/lib/wine/x86_64-windows" ]]

          # WineCharm recognizes this as a combined 64-bit WoW64 runner by its
          # name and bin/wine64. The staged tree is disposable at this point.
          rm -f "$runner/bin/wine64"
          ln -s wine "$runner/bin/wine64"

          # tar --zstd uses zstd's default level (3). Level 19 plus a 128 MiB
          # window produces a smaller release archive while remaining portable.
          tar -C "$runner" \
            --transform="flags=r;s|^\\.|$runner_name|" \
            -cf - . | zstd -T0 -19 --long=27 --no-progress -o "$archive"

          mapfile -t roots < <(tar --zstd -tf "$archive" | sed 's|/.*||' | sort -u)
          [[ ${#roots[@]} -eq 1 && ${roots[0]} == "$runner_name" ]]
          tar --zstd -tf "$archive" | grep -Fx "$runner_name/bin/wine" >/dev/null
          tar --zstd -tf "$archive" | grep "^$runner_name/lib/wine/i386-windows/" >/dev/null
          tar --zstd -tf "$archive" | grep "^$runner_name/lib/wine/x86_64-windows/" >/dev/null

          verify_dir=$(mktemp -d)
          trap 'rm -rf "$verify_dir"' EXIT
          tar --zstd -xf "$archive" -C "$verify_dir" "$runner_name/bin/wine64"
          [[ -L "$verify_dir/$runner_name/bin/wine64" ]]
          [[ $(readlink "$verify_dir/$runner_name/bin/wine64") == wine ]]

          sha256=$(sha256sum "$archive" | awk '{print $1}')
          printf '%s  %s\n' "$sha256" "$(basename "$archive")" > "$archive.sha256"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine365-${{ steps.version.outputs.version }}-wow64-x86_64
          path: |
            release/*.run
            release/*.tar.zst
            release/*.sha256
            release/*.manifest.json
          if-no-files-found: error
          compression-level: 0

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/wine365-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" release/* --clobber
